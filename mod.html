<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mod - Litterbox</title>
<link rel="icon" type="image/png" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="assets/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
.page-wrap { max-width: 1060px; margin: 0 auto; padding: 0 clamp(16px, 5vw, 56px) 64px; }

.banner { height: 220px; margin: 24px 0 0; border-radius: var(--radius-lg);
  background: linear-gradient(135deg, #182620, #10221c);
  position: relative; overflow: hidden; border: 1px solid var(--color-border);
}
.banner img { width: 100%; height: 100%; object-fit: cover; }
.banner::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0) 45%, rgba(0,0,0,0.55) 100%);
}
.banner-fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--color-text-faint); }

.mod-head { display: flex; align-items: flex-end; gap: 18px; margin-top: -36px; padding: 0 8px; position: relative; z-index: 2; }
.mod-head-icon {
  width: 96px; height: 96px; border-radius: 20px; background: var(--color-accent-tint);
  border: 4px solid var(--color-bg); overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-weight: 700; font-size: 24px; color: var(--color-accent);
}
.mod-head-icon img { width: 100%; height: 100%; object-fit: cover; }

.mod-head-info { flex: 1; min-width: 0; padding-bottom: 6px; }
.mod-head-info h1 { margin: 0 0 5px; font-size: 30px; font-weight: 800; letter-spacing: -0.7px; line-height: 1.15; }
.mod-head-sub { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.mod-head-author { font-family: var(--font-mono); font-size: 13.5px; color: var(--color-text-faint); }
.author-link { color: inherit; text-decoration: none; }
.author-link:hover { color: var(--color-accent); text-decoration: underline; }

.mod-head-meta { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 12px; padding: 0 8px; }
.mod-head-meta .stars-icons { font-size: 14px; }

.content-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-top: 26px; }

.card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--color-text-faint); margin: 0 0 12px; font-weight: 800; }
.mod-desc-full { font-size: 14.5px; }

.side-stack { display: flex; flex-direction: column; gap: 16px; }

.actions-card .actions-row { margin-top: 10px; }
.actions-card .actions-row { display: flex; gap: 8px; }
.actions-card .actions-row > * { flex: 1; }
.actions-card .file-unavailable { font-size: 13px; color: var(--color-text-faint); text-align: center; display: block; padding: 8px 0; }

.stars-icons { position: relative; line-height: 1; letter-spacing: 2px; font-size: 15px; }
.stars-bg { color: var(--color-border-strong); }
.stars-fg { position: absolute; top: 0; left: 0; overflow: hidden; white-space: nowrap; color: var(--color-gold); }

.rate-box { text-align: center; }
.rate-box h2 { text-align: left; }
.rate-stars { display: inline-flex; gap: 4px; cursor: pointer; font-size: 26px; line-height: 1; margin: 6px 0 4px; }
.rate-stars .star { color: var(--color-border-strong); transition: color .08s ease, transform .08s ease; }
.rate-stars .star:hover { transform: scale(1.1); }
.rate-stars .star.active { color: var(--color-gold); }
.rate-hint { font-size: 12px; color: var(--color-text-faint); }
.rate-login-hint { font-size: 13px; color: var(--color-text-muted); }
.rate-login-hint a { font-weight: 600; text-decoration: none; }
.rate-login-hint a:hover { text-decoration: underline; }

.preview-notice {
  font-size: 13px; line-height: 1.5; color: var(--color-text-muted);
  background: rgba(245, 185, 66, 0.08); border: 1px solid rgba(245, 185, 66, 0.3);
  border-radius: var(--radius-sm); padding: 12px 14px;
}

@media (max-width: 700px) {
  .content-grid { grid-template-columns: 1fr; }
  .mod-head { flex-wrap: wrap; margin-top: -40px; }
  .mod-head-icon { width: 76px; height: 76px; border-radius: 16px; }
  .banner { height: 150px; }
}
@media (max-width: 480px) {
  .mod-head-info h1 { font-size: 21px; }
  .mod-head-meta { gap: 10px 14px; }
}
</style>
</head>
<body>

<header class="site-header">
  <a class="brand" href="index.html">
    <img src="assets/logo.png" alt="" class="brand-mark">
    <span class="brand-name">Litterbox</span>
  </a>
  <div class="header-right">
    <span id="notifSlot"></span>
    <a class="nav-link" id="userNameLink" href="#" style="display:none;"></a>
    <a class="nav-link" href="index.html">← Back to mods</a>
    <button class="nav-link" id="logoutBtn" style="display:none;">Log out</button>
  </div>
</header>

<div id="gate" class="gate-state">Loading mod…</div>

<div class="page-wrap" id="pageWrap" style="display:none;">

  <div class="banner" id="banner">
    <div class="banner-fallback" id="bannerFallback">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M2 12c4-9 8-9 12 0s8 9 12 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </div>
  </div>

  <div class="mod-head">
    <div class="mod-head-icon" id="modIcon"></div>
    <div class="mod-head-info">
      <h1 id="modName"></h1>
      <div class="mod-head-sub">
        <span class="mod-head-author" id="modAuthor"></span>
        <span class="tag-pill preview-pill" id="previewPill" style="display:none;">Preview</span>
      </div>
    </div>
  </div>

  <div class="mod-head-meta" id="modHeadMeta"></div>

  <div class="status-banner" id="statusBanner" style="display:none;"></div>

  <div class="content-grid">
    <div class="main-col">
      <div class="card">
        <h2>Description</h2>
        <div class="mod-desc-full md-content" id="modDesc"></div>
      </div>

      <div class="card">
        <h2>Updates</h2>
        <div id="changelogList"><p class="empty-inline">Loading updates…</p></div>
      </div>
    </div>

    <div class="side-stack">
      <div class="card actions-card" id="actionsCard"></div>
      <div class="card rate-box" id="rateCard"></div>
      <div class="card" id="reportCard" style="display:none;"></div>
    </div>
  </div>
</div>

<script>

const gateEl = document.getElementById("gate");
const pageWrapEl = document.getElementById("pageWrap");
const userNameEl = document.getElementById("userNameLink");
const logoutBtn = document.getElementById("logoutBtn");

let currentUser = null;
let currentMod = null;
let myRating = 0;
let myFavorited = false;
let myFollowing = false;

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function isTrustedStorageUrl(url) {
  return typeof url === "string" && url.startsWith(TRUSTED_STORAGE_PREFIX);
}

function iconInitials(name) {
  if (!name) return "?";
  const words = name.trim().split(/\s+/);
  return words.slice(0, 2).map(w => w[0]?.toUpperCase() || "").join("") || "?";
}

function timeAgo(dateStr) {
  if (!dateStr) return "";
  const then = new Date(dateStr).getTime();
  const diffSec = Math.max(1, Math.floor((Date.now() - then) / 1000));
  const units = [[31536000, "year"], [2592000, "month"], [86400, "day"], [3600, "hour"], [60, "minute"], [1, "second"]];
  for (const [secs, label] of units) {
    const val = Math.floor(diffSec / secs);
    if (val >= 1) return `${val} ${label}${val > 1 ? "s" : ""} ago`;
  }
  return "just now";
}

function getModIdFromUrl() {
  return new URLSearchParams(window.location.search).get("id");
}

const MOD_DOWNLOAD_ICON = `<svg width="13" height="13" viewBox="0 0 20 20" fill="none"><path d="M10 3v9.5M6 9l4 4 4-4M4 16.5h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const MOD_CLOCK_ICON = `<svg width="13" height="13" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7.3" stroke="currentColor" stroke-width="1.5"/><path d="M10 6v4.3l3 1.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function renderMetaRow(mod) {
  return `
    ${mod.is_preview
      ? `<span class="stat-chip">${BELL_ICON}<strong>${LB_formatCount(mod.follow_count ?? 0)}</strong> following</span>`
      : `<span class="stat-chip">${MOD_DOWNLOAD_ICON}<strong>${LB_formatCount(mod.download_count ?? 0)}</strong> downloads</span>`}
    <span class="stat-chip">${HEART_ICON}<strong>${LB_formatCount(mod.favorite_count ?? 0)}</strong> favorites</span>
    <span class="stat-chip stat-rating">${renderStatStars(mod.rating)}<span style="color:var(--color-text-faint)">(${mod.rating_count ?? 0})</span></span>
    <span class="stat-chip">${MOD_CLOCK_ICON}Added ${timeAgo(mod.created_at)}</span>
  `;
}

function renderStatStars(rating) {
  const value = Number(rating) || 0;
  const percent = Math.max(0, Math.min(100, (value / 5) * 100));
  return `
    <span class="stars-icons">
      <span class="stars-bg">★★★★★</span>
      <span class="stars-fg" style="width:${percent}%;">★★★★★</span>
    </span> ${value.toFixed(1)}
  `;
}

function renderRateBox() {
  const rateCard = document.getElementById("rateCard");

  if (currentMod.user_id === currentUser?.id) {
    rateCard.innerHTML = `
      <h2>Your mod</h2>
      <p class="rate-login-hint">You uploaded this mod. Head to the manage page to update it.</p>
    `;
    return;
  }

  if (!currentUser) {
    rateCard.innerHTML = `
      <h2>Rate this mod</h2>
      <p class="rate-login-hint"><a href="login.html">Log in</a> to leave a rating.</p>
    `;
    return;
  }

  rateCard.innerHTML = `
    <h2>Rate this mod</h2>
    <div class="rate-stars" role="group" aria-label="Rate this mod">
      ${[1, 2, 3, 4, 5].map(n => `<span class="star${myRating >= n ? " active" : ""}" data-value="${n}">★</span>`).join("")}
    </div>
    <div class="rate-hint" id="rateHint">${myRating ? `You rated it ${myRating}★` : "Tap a star to rate"}</div>
  `;

  const groupEl = rateCard.querySelector(".rate-stars");
  const hintEl = document.getElementById("rateHint");

  groupEl.addEventListener("mouseover", (e) => {
    const star = e.target.closest(".star");
    if (!star) return;
    previewStars(groupEl, Number(star.dataset.value));
  });
  groupEl.addEventListener("mouseleave", () => previewStars(groupEl, myRating));
  groupEl.addEventListener("click", (e) => {
    const star = e.target.closest(".star");
    if (!star) return;
    submitRating(Number(star.dataset.value), groupEl, hintEl);
  });
}

function previewStars(groupEl, value) {
  groupEl.querySelectorAll(".star").forEach(starEl => {
    starEl.classList.toggle("active", Number(starEl.dataset.value) <= value);
  });
}

async function submitRating(value, groupEl, hintEl) {
  const previous = myRating;
  myRating = value;
  previewStars(groupEl, value);
  hintEl.textContent = "Saving…";

  const { error } = await supabaseClient
    .from("mod_ratings")
    .upsert(
      { mod_id: currentMod.id, user_id: currentUser.id, rating: value, updated_at: new Date().toISOString() },
      { onConflict: "mod_id,user_id" }
    );

  if (error) {
    console.error("Error saving rating:", error);
    myRating = previous;
    previewStars(groupEl, previous);
    hintEl.textContent = "Couldn't save rating";
    return;
  }

  hintEl.textContent = `You rated it ${value}★`;

  const { data: modRow, error: modError } = await supabaseClient
    .from("mods")
    .select("rating, rating_count")
    .eq("id", currentMod.id)
    .single();

  if (!modError && modRow) {
    currentMod.rating = modRow.rating;
    currentMod.rating_count = modRow.rating_count;
    document.getElementById("modHeadMeta").innerHTML = renderMetaRow(currentMod);
  }
}

function renderMod() {
  const mod = currentMod;
  const safeIconUrl = isTrustedStorageUrl(mod.icon_url) ? escapeHtml(mod.icon_url) : null;
  const safeBannerUrl = isTrustedStorageUrl(mod.banner_url) ? escapeHtml(mod.banner_url) : null;
  const safeFileUrl = isTrustedStorageUrl(mod.file_url) ? escapeHtml(mod.file_url) : null;

  document.title = `${mod.name} - Litterbox`;

  const bannerEl = document.getElementById("banner");
  if (safeBannerUrl) {
    bannerEl.innerHTML = `<img src="${safeBannerUrl}" alt="">`;
  }

  const iconEl = document.getElementById("modIcon");
  iconEl.innerHTML = safeIconUrl ? `<img src="${safeIconUrl}" alt="">` : iconInitials(mod.name);

  document.getElementById("modName").textContent = mod.name;
  document.getElementById("modAuthor").innerHTML = `by ${escapeHtml(mod.author || "unknown")}${mod.profiles?.is_verified ? `
    <svg class="verified-badge" viewBox="0 0 20 20" width="14" height="14" aria-label="Verified creator">
      <circle cx="10" cy="10" r="10" fill="var(--color-accent)"/>
      <path d="M6 10.2L8.7 13L14 7.3" fill="none" stroke="var(--color-bg-soft)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>` : ""}`;

  document.getElementById("modDesc").innerHTML = LB_renderMarkdown(mod.description || "") || `<p class="empty-inline">No description yet.</p>`;

  document.getElementById("previewPill").style.display = mod.is_preview ? "inline-flex" : "none";

  document.getElementById("modHeadMeta").innerHTML = renderMetaRow(mod);

  const statusBanner = document.getElementById("statusBanner");
  if (mod.review_status === "pending") {
    statusBanner.className = "status-banner";
    statusBanner.style.display = "block";
    statusBanner.innerHTML = `<strong>Awaiting review.</strong> This mod is only visible to you right now. It'll show up for everyone once an admin approves it — usually quick.`;
  } else if (mod.review_status === "rejected") {
    statusBanner.className = "status-banner rejected";
    statusBanner.style.display = "block";
    statusBanner.innerHTML = `<strong>Rejected.</strong> This mod isn't public.${mod.moderation_note ? ` Reason: ${escapeHtml(mod.moderation_note)}` : ""} Fix the issue and reach out if you think this was a mistake.`;
  } else {
    statusBanner.style.display = "none";
  }

  const showFav = currentUser && mod.user_id !== currentUser.id;
  const showFollow = currentUser && mod.user_id !== currentUser.id;
  const showManage = mod.user_id === currentUser?.id;
  const actionsEl = document.getElementById("actionsCard");
  actionsEl.innerHTML = `
    ${safeFileUrl
      ? `<a class="btn btn-primary btn-block" id="downloadBtn" href="${safeFileUrl}" download><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M10 3v9.5M6 9l4 4 4-4M4 16.5h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Download data.win</a>`
      : mod.is_preview
        ? `<div class="preview-notice">This mod is a preview — the creator hasn't added the file yet. Follow it below to get notified the moment it's released.</div>`
        : `<span class="file-unavailable">File unavailable</span>`}
    ${(showFav || showFollow || showManage) ? `<div class="actions-row">
      ${showFav ? LB_renderFavoriteBtn(myFavorited, mod.favorite_count) : ""}
      ${showFollow ? LB_renderFollowBtn(myFollowing, mod.follow_count) : ""}
      ${showManage ? `<a class="btn btn-secondary" href="edit.html?id=${mod.id}">Manage</a>` : ""}
    </div>` : ""}
  `;

  const downloadBtn = document.getElementById("downloadBtn");
  if (downloadBtn) {
    downloadBtn.addEventListener("click", async () => {
      // Only bump the on-screen count once the database write actually
      // succeeds — this is what used to make the number revert on refresh.
      const { error } = await supabaseClient.rpc("increment_download_count", { target_mod_id: mod.id });
      if (error) {
        console.error("Couldn't record the download (check that the increment_download_count function exists in Supabase):", error);
        return;
      }
      mod.download_count = (mod.download_count || 0) + 1;
      document.getElementById("modHeadMeta").innerHTML = renderMetaRow(mod);
    });
  }

  wireFavButton();
  wireFollowButton();
  renderReportCard();

  renderRateBox();

  gateEl.style.display = "none";
  pageWrapEl.style.display = "block";
}

function renderReportCard() {
  const card = document.getElementById("reportCard");
  const mod = currentMod;
  if (!currentUser || mod.user_id === currentUser.id) {
    card.style.display = "none";
    return;
  }
  card.style.display = "block";
  card.innerHTML = `<button type="button" class="report-link" id="reportToggle">Report this mod</button>`;

  document.getElementById("reportToggle").addEventListener("click", async () => {
    const { data: existing } = await supabaseClient
      .from("reports").select("id").eq("mod_id", mod.id).eq("reporter_id", currentUser.id).eq("status", "open").maybeSingle();
    if (existing) {
      card.innerHTML = `<p class="empty-inline">You've already reported this mod — the team's on it.</p>`;
      return;
    }

    card.innerHTML = `
      <form id="reportForm" class="report-form">
        <label for="reportReason">Why are you reporting this?</label>
        <select id="reportReason" required>
          <option value="">Choose a reason…</option>
          <option value="malware">Unsafe / suspicious file</option>
          <option value="spam">Spam</option>
          <option value="inappropriate">Inappropriate content</option>
          <option value="stolen">Stolen work / not the creator</option>
          <option value="other">Other</option>
        </select>
        <textarea id="reportDetails" maxlength="400" placeholder="Any extra details (optional)"></textarea>
        <button type="submit" class="btn btn-secondary btn-block" id="reportSubmitBtn">Submit report</button>
        <p class="empty-inline" id="reportMsg"></p>
      </form>
    `;

    document.getElementById("reportForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("reportSubmitBtn");
      const msg = document.getElementById("reportMsg");
      btn.disabled = true;
      btn.textContent = "Submitting…";

      const { error } = await supabaseClient.from("reports").insert({
        mod_id: mod.id,
        reporter_id: currentUser.id,
        reason: document.getElementById("reportReason").value,
        details: document.getElementById("reportDetails").value.trim() || null,
      });

      if (error) {
        console.error(error);
        msg.textContent = "Couldn't submit the report — try again.";
        btn.disabled = false;
        btn.textContent = "Submit report";
        return;
      }
      card.innerHTML = `<p class="empty-inline">Thanks — the team will take a look.</p>`;
    });
  });
}

function wireFavButton() {
  const favBtn = document.getElementById("lbFavBtn");
  if (!favBtn) return;
  favBtn.addEventListener("click", async () => {
    favBtn.disabled = true;
    const wasFavorited = myFavorited;
    myFavorited = await LB_toggleFavorite(currentMod.id, currentUser.id, myFavorited);
    // Only touch the count/meta row if the toggle actually went through —
    // otherwise a rejected write (e.g. an RLS policy blocking the insert)
    // would still bump the displayed number even though nothing saved.
    if (myFavorited !== wasFavorited) {
      currentMod.favorite_count = Math.max(0, (currentMod.favorite_count || 0) + (myFavorited ? 1 : -1));
      document.getElementById("modHeadMeta").innerHTML = renderMetaRow(currentMod);
    }
    favBtn.outerHTML = LB_renderFavoriteBtn(myFavorited, currentMod.favorite_count);
    wireFavButton();
  });
}

function wireFollowButton() {
  const followBtn = document.getElementById("lbFollowBtn");
  if (!followBtn) return;
  followBtn.addEventListener("click", async () => {
    followBtn.disabled = true;
    const wasFollowing = myFollowing;
    myFollowing = await LB_toggleFollow(currentMod.id, currentUser.id, myFollowing);
    // Same reasoning as wireFavButton: don't move the counter unless the
    // follow/unfollow write actually succeeded.
    if (myFollowing !== wasFollowing) {
      currentMod.follow_count = Math.max(0, (currentMod.follow_count || 0) + (myFollowing ? 1 : -1));
      document.getElementById("modHeadMeta").innerHTML = renderMetaRow(currentMod);
    }
    followBtn.outerHTML = LB_renderFollowBtn(myFollowing, currentMod.follow_count);
    wireFollowButton();
  });
}

async function loadMyRating() {
  if (!currentUser) { myRating = 0; return; }
  const { data, error } = await supabaseClient
    .from("mod_ratings")
    .select("rating")
    .eq("mod_id", currentMod.id)
    .eq("user_id", currentUser.id)
    .maybeSingle();
  myRating = (!error && data) ? data.rating : 0;
}

async function init() {
  const modId = getModIdFromUrl();
  if (!modId) {
    gateEl.textContent = "No mod specified.";
    return;
  }

  const { data: sessionData } = await supabaseClient.auth.getSession();
  currentUser = sessionData.session?.user || null;

  if (currentUser) {
    const username = currentUser.user_metadata?.username || currentUser.email;
    userNameEl.textContent = username;
    userNameEl.href = `profile.html?u=${encodeURIComponent(username)}`;
    userNameEl.style.display = "inline-block";
    logoutBtn.style.display = "inline-block";
    logoutBtn.addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.reload();
    });
    LB_mountNotifications(document.getElementById("notifSlot"), currentUser.id);
  }

  const { data, error } = await supabaseClient
    .from("mods")
    .select("*, profiles!mods_profiles_fkey(is_verified)")
    .eq("id", modId)
    .single();

  if (error || !data) {
    gateEl.textContent = "That mod doesn't exist.";
    return;
  }

  currentMod = data;
  await loadMyRating();
  myFavorited = await LB_isFavorited(currentMod.id, currentUser?.id);
  myFollowing = await LB_isFollowing(currentMod.id, currentUser?.id);
  renderMod();
  loadChangelogs();
}

async function loadChangelogs() {
  const changelogs = await LB_loadChangelogs(currentMod.id);
  document.getElementById("changelogList").innerHTML = LB_renderChangelogList(changelogs);
}

init();
</script>

</body>
</html>
